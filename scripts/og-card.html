<!doctype html>
<!-- OG-card artboard — renders the 1200×630 link-preview image.
     Regenerate: open at viewport 1200×630, wait for fonts, screenshot
     → public/og-card.png. Visual language mirrors the cinematic homepage:
     warm black, ivory type, brass signal, and a settled particle system. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background:
        radial-gradient(circle at 78% 30%, rgba(196,154,67,0.12), transparent 28%),
        linear-gradient(145deg, rgba(255,255,255,0.025), transparent 45%),
        #090908;
      position: relative;
      color: #fffcf7;
    }
    body::after {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(255,252,247,0.1);
      pointer-events: none;
    }
    canvas { position: absolute; inset: 0; }
    .text {
      position: absolute;
      left: 86px;
      top: 72px;
      width: 620px;
      z-index: 2;
    }
    .wordmark {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 23px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #fffcf7;
    }
    .rule {
      width: 64px;
      height: 1px;
      background: rgba(196,154,67,0.82);
      margin: 44px 0 42px;
    }
    .headline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 60px;
      line-height: 1.07;
      letter-spacing: -0.035em;
      color: #fffcf7;
    }
    .headline em {
      display: block;
      font-family: 'Libre Baskerville', serif;
      font-weight: 400;
      color: #e6d8b9;
    }
    .line {
      margin-top: 42px;
      max-width: 510px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.65;
      letter-spacing: 0.045em;
      color: rgba(255,252,247,0.58);
    }
    .label {
      position: absolute;
      right: 74px;
      bottom: 58px;
      z-index: 2;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255,252,247,0.32);
    }
  </style>
</head>
<body>
  <canvas id="particles" width="2400" height="1260" style="width:1200px;height:630px;"></canvas>
  <div class="text">
    <div class="wordmark">Karst</div>
    <div class="rule"></div>
    <div class="headline">District-owned <em>AI capability.</em></div>
    <div class="line">Protected build time. Working district systems. Capability your team can keep improving.</div>
  </div>
  <div class="label">Workshop · Fieldwork · Learning Platforms</div>
  <script>
    // Settled capability field: scattered inputs converge into one owned operating layer.
    const ctx = document.getElementById('particles').getContext('2d')
    ctx.setTransform(2, 0, 0, 2, 0, 0)
    const prand = (n) => {
      const x = Math.sin(n * 12.9898 + 78.233) * 43758.5453
      return x - Math.floor(x)
    }

    for (let i = 0; i < 126; i++) {
      const x = 718 + prand(i * 3 + 1) * 396
      const y = 76 + prand(i * 7 + 4) * 420
      const r = 0.75 + prand(i * 11 + 3) * 1.5
      const bright = prand(i * 17 + 2)
      ctx.beginPath()
      ctx.fillStyle = bright > 0.92
        ? 'rgba(196,154,67,0.84)'
        : `rgba(255,252,247,${0.1 + bright * 0.3})`
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.fill()
    }

    const cols = 7
    const rows = 5
    const ox = 824
    const oy = 192
    const gapX = 38
    const gapY = 38
    ctx.strokeStyle = 'rgba(196,154,67,0.16)'
    ctx.lineWidth = 1
    ctx.strokeRect(ox - 28, oy - 28, gapX * (cols - 1) + 56, gapY * (rows - 1) + 56)

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const i = row * cols + col
        const x = ox + col * gapX
        const y = oy + row * gapY
        ctx.beginPath()
        ctx.fillStyle = i === 17
          ? '#c49a43'
          : `rgba(255,252,247,${0.34 + prand(i * 19 + 5) * 0.36})`
        ctx.arc(x, y, i === 17 ? 4.5 : 2.5, 0, Math.PI * 2)
        ctx.fill()
      }
    }

    ctx.beginPath()
    ctx.strokeStyle = 'rgba(196,154,67,0.55)'
    ctx.lineWidth = 1
    ctx.moveTo(778, 382)
    ctx.lineTo(1054, 382)
    ctx.stroke()
  </script>
</body>
</html>
